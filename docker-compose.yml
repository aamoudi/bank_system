version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_NAME=MASAREEFI
      - APP_ENV=local
      - APP_KEY=base64:YOUR_KEY_HERE
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=your_aiven_host
      - DB_PORT=3306
      - DB_DATABASE=your_db
      - DB_USERNAME=your_user
      - DB_PASSWORD=your_password
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    volumes:
      - ./storage:/var/www/html/storage